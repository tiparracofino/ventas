<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Uriba">
<title>Uriba</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f8f5f0;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gray: #888;
    --border: #d4cfc9;
    --shadow: rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-weight: 300;
    -webkit-tap-highlight-color: transparent;
  }
  
  header {
    background: var(--ink);
    color: var(--paper);
    padding: calc(20px + env(safe-area-inset-top)) 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--red);
  }
  .header-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .logo { display: flex; flex-direction: column; gap: 2px; }
  .logo-main {
    font-family: 'Cinzel', serif; font-size: 24px; font-weight: 600; letter-spacing: 4px; color: var(--paper);
  }
  .logo-sub { font-size: 9px; letter-spacing: 3px; color: var(--gray); text-transform: uppercase; }
  .logo-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; display: inline-block; margin-left: 4px; vertical-align: middle; }

  .header-center {
    position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 6px;
  }
  .io-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6);
    font-size: 8px; padding: 4px 8px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 2px; transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif;
  }
  .io-btn:active { color: var(--paper); border-color: var(--paper); }

  nav {
    max-width: 640px; margin: 0 auto; display: flex; border-bottom: 1px solid var(--border); background: var(--paper); position: sticky; top: calc(79px + env(safe-area-inset-top)); z-index: 99;
  }
  nav button {
    flex: 1; padding: 14px 8px; background: none; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  nav button .nav-jp { font-family: 'Noto Serif JP', serif; font-size: 14px; color: var(--ink); }
  nav button.active { color: var(--red); border-bottom-color: var(--red); }
  nav button.active .nav-jp { color: var(--red); }

  main { max-width: 640px; margin: 0 auto; padding: 24px 16px 100px; }

  .btn-primary { background: var(--ink); color: var(--paper); border: none; padding: 12px 24px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn-primary:active { background: var(--red); }
  .btn-ghost { background: none; border: 1px solid var(--border); padding: 8px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; letter-spacing: 1px; cursor: pointer; color: var(--ink); transition: border-color 0.2s; }
  .btn-ghost:active { border-color: var(--ink); }

  .search-bar { width: 100%; padding: 12px 16px; font-size: 14px; border: 1px solid var(--border); background: white; margin-bottom: 20px; outline: none; transition: border-color 0.2s; font-family: 'Noto Sans JP', sans-serif; border-radius: 0; -webkit-appearance: none;}
  .search-bar:focus { border-color: var(--ink); }

  .section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .section-head h2 { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 400; }
  .section-head span { font-size: 11px; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; }
  .count-badge { background: var(--red); color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; letter-spacing: 0; }

  .ad-card { border: 1px solid var(--border); background: white; margin-bottom: 16px; display: flex; gap: 0; position: relative; overflow: hidden; transition: box-shadow 0.2s; }
  .ad-card-accent { width: 4px; background: var(--border); flex-shrink: 0; }
  .ad-card.vendido .ad-card-accent { background: #27ae60; }
  .ad-card.reservado .ad-card-accent { background: #f39c12; }
  .ad-card.activo .ad-card-accent { background: var(--red); }

  .ad-image-slot { width: 90px; min-height: 90px; background: #f0ece6; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--border); overflow: hidden; position: relative; }
  .ad-image-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

  .ad-content { padding: 12px 12px 12px 14px; flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .ad-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 400; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ad-price { font-size: 18px; font-weight: 700; color: var(--red); letter-spacing: -0.5px; display: flex; align-items: baseline; gap: 6px; }
  .ad-price span { font-size: 11px; font-weight: 300; color: var(--gray); letter-spacing: 0; }
  .ad-desc { font-size: 11px; color: var(--gray); margin-top: 4px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ad-meta { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  
  .status-chip { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border: 1px solid; }
  .status-chip.activo { color: var(--red); border-color: var(--red); }
  .status-chip.vendido { color: #27ae60; border-color: #27ae60; }
  .status-chip.reservado { color: #f39c12; border-color: #f39c12; }
  .status-chip.borrador { color: var(--gray); border-color: var(--border); }
  .cat-chip { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--gray); background: var(--paper); padding: 2px 8px; border: 1px solid var(--border); }

  .ad-actions { display: flex; gap: 6px; padding: 8px 12px 12px 14px; align-items: flex-end; flex-direction: column; justify-content: space-between; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; color: var(--gray); transition: color 0.2s; }
  .icon-btn:active { color: var(--red); }

  .form-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,0.85); z-index: 200; align-items: flex-end; justify-content: center; }
  .form-overlay.open { display: flex; }
  .form-panel { background: var(--paper); width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto; border-top: 3px solid var(--red); padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .form-title { font-family: 'Noto Serif JP', serif; font-size: 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: flex; flex-direction: column; gap: 5px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray); }
  input, textarea, select { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; padding: 10px 12px; border: 1px solid var(--border); background: white; color: var(--ink); outline: none; transition: border-color 0.2s; width: 100%; font-weight: 300; border-radius: 0; -webkit-appearance: none; }
  select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 12px; }
  input:focus, textarea:focus, select:focus { border-color: var(--ink); }
  textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; align-items: center; }

  .caja-card { border: 1px solid var(--border); background: white; margin-bottom: 16px; overflow: hidden; }
  .caja-header { background: var(--ink); color: var(--paper); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .caja-name { font-family: 'Noto Serif JP', serif; font-size: 15px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; flex: 1; }
  .caja-icon { display: flex; align-items: center; justify-content: center; }
  .hanko-icon { width: 28px; height: 18px; border: 1px solid var(--paper); background: white; display: flex; align-items: center; justify-content: center; }
  .hanko-circle { width: 8px; height: 8px; background-color: var(--red); border-radius: 50%; }
  .caja-body { padding: 0; display: none; }
  .caja-body.open { display: block; }
  .caja-item { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px; font-size: 13px; }
  .caja-item:last-child { border-bottom: none; }
  .caja-item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .caja-item-dot.linked { background: var(--red); }
  .caja-item-name { flex: 1; }
  .caja-add-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: none; border: none; width: 100%; text-align: left; font-size: 11px; letter-spacing: 1px; color: var(--gray); cursor: pointer; border-top: 1px dashed var(--border); font-family: 'Noto Sans JP', sans-serif; text-transform: uppercase; }
  .caja-add-btn:active { color: var(--red); background: #fdfdfd; }

  .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
  .empty-jp { font-family: 'Noto Serif JP', serif; font-size: 36px; display: block; margin-bottom: 8px; opacity: 0.2; }
  .empty p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin-bottom: 20px; border: 1px solid var(--border); }
  .stat-cell { background: white; padding: 14px 12px; text-align: center; }
  .stat-val { font-family: 'Noto Serif JP', serif; font-size: 22px; display: block; color: var(--red); }
  .stat-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }

  .wallapop-box { background: #fff; border: 1px solid var(--border); border-top: none; padding: 16px; display: none; }
  .wallapop-box.open { display: block; }
  .wallapop-box h4 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .wallapop-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; color: var(--ink); background: var(--paper); padding: 12px; border-left: 3px solid var(--red); }
  .copy-btn { margin-top: 8px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; background: var(--ink); color: white; border: none; padding: 8px 14px; cursor: pointer; transition: background 0.2s; }
  .copy-btn:active { background: var(--red); }

  .img-upload-area { border: 1px dashed var(--border); background: white; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative; }
  .img-upload-area:active { border-color: var(--ink); background: var(--paper); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-upload-area p { font-size: 11px; color: var(--gray); letter-spacing: 1px; }
  #loading-spinner { display: none; font-size: 11px; color: var(--red); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

  .img-preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
  .img-preview { aspect-ratio: 1; background: #f0ece6; overflow: hidden; position: relative; border: 1px solid var(--border); }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview .del-img { position: absolute; top: 2px; right: 2px; background: rgba(26,26,26,0.8); color: white; border: none; width: 20px; height: 20px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  .fab { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 50%; transform: translateX(290px); background: var(--red); color: white; border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 28px; font-weight: 300; cursor: pointer; box-shadow: 0 4px 16px rgba(192,57,43,0.4); transition: transform 0.2s, box-shadow 0.2s; z-index: 150; display: flex; align-items: center; justify-content: center; }
  .fab:active { transform: translateX(290px) scale(0.95); }
  @media (max-width: 640px) { .fab { right: 20px; transform: none; } .fab:active { transform: scale(0.95); } }

  .filter-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 6px 16px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; border: 1px solid var(--border); background: white; cursor: pointer; color: var(--gray); transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; }
  .filter-chip.active { background: var(--ink); color: white; border-color: var(--ink); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-main">URIBA<span class="logo-dot"></span></span>
      <span class="logo-sub">Goodbye Things</span>
    </div>
    
    <div class="header-center">
      <button class="io-btn" onclick="exportData()">↓ exp</button>
      <button class="io-btn" onclick="document.getElementById('importFile').click()">↑ imp</button>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
    </div>

    <div style="font-size:11px;letter-spacing:2px;color:var(--gray);text-align:right;">
      <div style="color:var(--paper);font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;">RESET</div>
      <div>dejar ir</div>
    </div>
  </div>
</header>

<nav id="mainNav">
  <button class="active" onclick="showSection('anuncios')" id="nav-anuncios">
    <span class="nav-jp">広告</span>
    anuncios
  </button>
  <button onclick="showSection('almacen')" id="nav-almacen">
    <span class="nav-jp">倉庫</span>
    almacén
  </button>
</nav>

<main>
  <section id="sec-anuncios">
    <div id="statsBar" class="stats-bar"></div>
    <input type="text" class="search-bar" id="searchAdsInput" placeholder="🔍 Buscar por nombre o categoría..." oninput="setSearch(this.value)">
    <div class="filter-row" id="filterRow"></div>
    
    <div class="section-head">
      <h2>広告</h2><span>anuncios</span><span class="count-badge" id="adCount">0</span>
    </div>
    <div id="adList"></div>
    <div id="emptyAds" class="empty" style="display:none;"><span class="empty-jp">無</span><p>Sin artículos aún</p></div>
  </section>

  <section id="sec-almacen" style="display:none;">
    <div class="section-head" style="justify-content: space-between; display: flex; width: 100%;">
      <div style="display: flex; align-items: baseline; gap: 12px;">
        <h2>倉庫</h2><span>almacén de cajas</span>
      </div>
      <div style="text-align: right;">
        <span id="almacenGrandTotal" style="font-size: 18px; font-weight: 700; color: var(--red); letter-spacing: 0;">0€</span>
        <span style="font-size: 9px; display: block; color: var(--gray); letter-spacing: 1px; text-transform: uppercase;">Valor Stock</span>
      </div>
    </div>
    <div id="cajaList"></div>
    <div id="emptyCajas" class="empty" style="display:none;"><span class="empty-jp">箱</span><p>Sin cajas aún</p></div>
    <div style="margin-top:16px;">
      <button class="btn-primary" style="width: 100%;" onclick="openCajaForm()">+ Nueva Caja</button>
    </div>
  </section>
</main>

<button class="fab" id="fabBtn" onclick="openAdForm()" title="Nuevo anuncio">+</button>

<div class="form-overlay" id="adFormOverlay">
  <div class="form-panel">
    <div class="form-title">
      <span id="formTitle">新しい広告 · Nuevo anuncio</span>
      <button class="icon-btn" onclick="closeAdForm()" style="font-size:20px;">✕</button>
    </div>
    <div class="form-grid">
      <label>Título del artículo<input type="text" id="f-title" placeholder="Ej: Cámara analógica Nikon FM2"></label>
      <div class="form-row">
        <label>Precio Unitario (€)<input type="number" id="f-price" placeholder="0"></label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
          <label>Disp.<input type="number" id="f-qty" value="1" min="0"></label>
          <label>Vendidos<input type="number" id="f-soldQty" value="0" min="0"></label>
        </div>
      </div>
      <div class="form-row">
        <label>Categoría
          <select id="f-cat">
            <option value="Tecnología">Tecnología</option>
            <option value="Ropa">Ropa</option>
            <option value="Hogar">Hogar</option>
            <option value="Libros">Libros</option>
            <option value="Arte">Arte</option>
            <option value="Deporte">Deporte</option>
            <option value="Música">Música</option>
            <option value="Otro">Otro</option>
          </select>
        </label>
        <label>Estado del artículo
          <select id="f-condition">
            <option value="Como nuevo">Como nuevo</option>
            <option value="Muy buen estado">Muy buen estado</option>
            <option value="Buen estado">Buen estado</option>
            <option value="Aceptable">Aceptable</option>
          </select>
        </label>
      </div>
      <label>Descripción para Wallapop<textarea id="f-desc" placeholder="Describe el artículo con honestidad. Medidas, defectos, motivo de venta..."></textarea></label>
      <div class="form-row">
        <label>Estado de venta
          <select id="f-status">
            <option value="borrador">Borrador</option>
            <option value="activo">Activo</option>
            <option value="reservado">Reservado</option>
            <option value="vendido">Vendido</option>
          </select>
        </label>
        <label>Caja asignada
          <select id="f-caja"><option value="">— Sin caja —</option></select>
        </label>
      </div>
      <label>Fotos
        <div class="img-upload-area">
          <input type="file" accept="image/*" multiple id="f-photos" onchange="handlePhotos(event)">
          <p>📷 Toca para añadir fotos</p>
          <div id="loading-spinner">Procesando imagen...</div>
        </div>
        <div class="img-preview-grid" id="photoPreviewGrid"></div>
      </label>
    </div>
    <div class="form-actions" style="justify-content: flex-end;">
      <button class="btn-ghost" onclick="closeAdForm()">Cancelar</button>
      <button class="btn-primary" onclick="saveAd()">Guardar 保存</button>
    </div>
  </div>
</div>

<div class="form-overlay" id="cajaFormOverlay">
  <div class="form-panel">
    <div class="form-title">
      <span id="cajaFormTitle">箱 · Nueva Caja</span>
      <button class="icon-btn" onclick="closeCajaForm()" style="font-size:20px;">✕</button>
    </div>
    <div class="form-grid">
      <label>Identificador de la caja<input type="text" id="cf-name" placeholder="Ej: CAJA-01"></label>
      <label>Descripción (opcional)<input type="text" id="cf-desc" placeholder="Ej: Junto a la ventana"></label>
    </div>
    <div class="form-actions" style="justify-content: space-between; width: 100%;">
      <button class="btn-ghost" id="cf-delete-btn" onclick="deleteCaja()" style="color: var(--red); border-color: transparent; padding-left: 0; display: none;">Eliminar</button>
      <div style="display: flex; gap: 10px; margin-left: auto;">
        <button class="btn-ghost" onclick="closeCajaForm()">Cancelar</button>
        <button class="btn-primary" onclick="saveCaja()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div class="form-overlay" id="itemFormOverlay">
  <div class="form-panel">
    <div class="form-title">
      <span>物品 · Añadir artículo</span>
      <button class="icon-btn" onclick="closeItemForm()" style="font-size:20px;">✕</button>
    </div>
    <div class="form-grid">
      <label>Nombre del artículo<input type="text" id="if-name" placeholder="¿Qué hay en esta caja?"></label>
      <label>Vincular con anuncio (opcional)
        <select id="if-ad"><option value="">— Sin vincular —</option></select>
      </label>
    </div>
    <div class="form-actions" style="justify-content: flex-end;">
      <button class="btn-ghost" onclick="closeItemForm()">Cancelar</button>
      <button class="btn-primary" onclick="saveItem()">Añadir</button>
    </div>
  </div>
</div>

<script>
let ads = JSON.parse(localStorage.getItem('uriba_ads') || '[]');
let cajas = JSON.parse(localStorage.getItem('uriba_cajas') || '[]');
let editingAdId = null;
let editingCajaId = null;
let currentPhotos = []; 
let currentFilter = 'Todos';
let searchQuery = '';

function getAdStock(ad) {
  let q = parseInt(ad.qty);
  if (isNaN(q)) q = ad.status === 'vendido' ? 0 : 1;
  let sq = parseInt(ad.soldQty);
  if (isNaN(sq)) sq = (ad.status === 'vendido' && q === 0) ? 1 : 0;
  return { qty: q, soldQty: sq };
}

function save() {
  localStorage.setItem('uriba_ads', JSON.stringify(ads));
  localStorage.setItem('uriba_cajas', JSON.stringify(cajas));
}

function exportData() {
  const data = { ads, cajas };
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href", dataStr);
  downloadAnchorNode.setAttribute("download", `uriba_backup_${new Date().toISOString().slice(0,10)}.json`);
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.ads && data.cajas) {
        ads = data.ads;
        cajas = data.cajas;
        save();
        renderAds();
        if (document.getElementById('sec-almacen').style.display === 'block') renderAlmacen();
        alert('Datos importados correctamente / データがインポートされました');
      } else {
        alert('El archivo no parece ser un backup válido de Uriba.');
      }
    } catch (err) {
      alert('Error al leer el archivo JSON.');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; 
}

function showSection(id) {
  ['anuncios','almacen'].forEach(s => {
    document.getElementById('sec-'+s).style.display = s===id ? 'block' : 'none';
    document.getElementById('nav-'+s).classList.toggle('active', s===id);
  });
  const fab = document.getElementById('fabBtn');
  fab.style.display = id === 'anuncios' ? 'flex' : 'none';
  if (id === 'almacen') renderAlmacen();
  else renderAds();
}

function renderStats() {
  const disponibles = ads.reduce((s, a) => s + getAdStock(a).qty, 0);
  const vendidos = ads.reduce((s, a) => s + getAdStock(a).soldQty, 0);
  const ganancias = ads.reduce((s, a) => s + ((parseFloat(a.price) || 0) * getAdStock(a).soldQty), 0);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-cell"><span class="stat-val">${disponibles}</span><span class="stat-label">disp.</span></div>
    <div class="stat-cell"><span class="stat-val">${vendidos}</span><span class="stat-label">vendidos</span></div>
    <div class="stat-cell"><span class="stat-val">${ganancias.toFixed(0)}€</span><span class="stat-label">ganados</span></div>
  `;
}

function renderFilters() {
  const cats = ['Todos', ...new Set(ads.map(a=>a.category))];
  document.getElementById('filterRow').innerHTML = cats.map(c =>
    `<button class="filter-chip ${c===currentFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) { currentFilter = cat; renderAds(); }
function setSearch(query) { searchQuery = query.toLowerCase(); renderAds(); }

function sellOneItem(id) {
  const ad = ads.find(a => a.id === id);
  if (!ad) return;
  
  const stock = getAdStock(ad);
  
  if (stock.qty > 0) {
    ad.qty = stock.qty - 1;
    ad.soldQty = stock.soldQty + 1;
    if (ad.qty === 0) ad.status = 'vendido';
  }
  
  save(); 
  renderAds();
  if (document.getElementById('sec-almacen').style.display === 'block') renderAlmacen();
}

function renderAds() {
  renderStats();
  renderFilters();
  
  let filtered = currentFilter === 'Todos' ? ads : ads.filter(a=>a.category===currentFilter);
  if (searchQuery) {
    filtered = filtered.filter(a => 
      (a.title && a.title.toLowerCase().includes(searchQuery)) || 
      (a.category && a.category.toLowerCase().includes(searchQuery)) ||
      (a.desc && a.desc.toLowerCase().includes(searchQuery))
    );
  }
  
  document.getElementById('adCount').textContent = filtered.length;
  const el = document.getElementById('adList');
  document.getElementById('emptyAds').style.display = filtered.length ? 'none' : 'block';

  el.innerHTML = filtered.map(ad => {
    const img = ad.photos && ad.photos[0] ? `<img src="${ad.photos[0]}" alt="">` : '📸';
    const cajaName = ad.cajaId ? (cajas.find(c=>c.id===ad.cajaId)||{name:'?'}).name : '';
    
    const { qty: currentQty, soldQty } = getAdStock(ad);
    
    return `
    <div class="ad-card ${ad.status}">
      <div class="ad-card-accent"></div>
      <div class="ad-image-slot">${img}</div>
      <div class="ad-content">
        <div class="ad-title">${ad.title || 'Sin título'}</div>
        <div class="ad-price">
          ${ad.price ? ad.price+'€' : '—'} 
          ${currentQty > 1 ? `<span style="font-size: 14px; font-weight: 400; color: var(--ink);">x${currentQty}</span>` : ''}
          <span>· ${ad.condition||''}</span>
        </div>
        <div class="ad-desc">${ad.desc||''}</div>
        <div class="ad-meta">
          <span class="status-chip ${ad.status}">${ad.status}</span>
          ${currentQty > 0 ? `<span class="cat-chip">Stock: ${currentQty}</span>` : ''}
          ${soldQty > 0 ? `<span class="cat-chip" style="color:#27ae60; border-color:#27ae60;">Vendidos: ${soldQty}</span>` : ''}
          <span class="cat-chip">${ad.category||''}</span>
          ${cajaName ? `<span class="cat-chip">📦 ${cajaName}</span>` : ''}
        </div>
        
        ${currentQty > 0 && ad.status !== 'vendido' ? `
          <div style="margin-top: 10px;">
            <button class="btn-ghost" style="padding: 5px 10px; font-size: 9px; color: #27ae60; border-color: #27ae60; border-radius: 2px; font-weight: 600;" onclick="sellOneItem('${ad.id}')">💰 VENDER 1</button>
          </div>
        ` : ''}
      </div>
      <div class="ad-actions">
        <button class="icon-btn" onclick="editAd('${ad.id}')" title="Editar">✎</button>
        <button class="icon-btn" onclick="toggleWallapop('${ad.id}')" title="Wallapop">📋</button>
        <button class="icon-btn" onclick="deleteAd('${ad.id}')" title="Eliminar" style="color:var(--red)">✕</button>
      </div>
    </div>
    <div class="wallapop-box" id="wbox-${ad.id}">
      <h4>📋 Texto para Wallapop</h4>
      <div class="wallapop-text">${generateWallapopText(ad, currentQty)}</div>
      <button class="copy-btn" onclick="copyWallapop('${ad.id}')">Copiar texto</button>
    </div>
    `;
  }).join('');
}

function generateWallapopText(ad, qty) {
  return [
    ad.title, '', ad.desc, '',
    `Estado: ${ad.condition || 'Buen estado'}`,
    qty > 1 ? `Cantidad disponible: ${qty}` : undefined,
    `Categoría: ${ad.category || ''}`, '',
    '📍 Entrega en mano o envío acordado.',
    'Precio: ' + (ad.price ? ad.price + '€' + (qty > 1 ? ' c/u' : '') : 'a convenir'),
  ].filter(l=>l!==undefined).join('\n');
}

function toggleWallapop(id) { document.getElementById('wbox-'+id).classList.toggle('open'); }

function copyWallapop(id) {
  const ad = ads.find(a=>a.id===id);
  if (!ad) return;
  const { qty: currentQty } = getAdStock(ad);
  const el = document.createElement('textarea');
  el.value = generateWallapopText(ad, currentQty);
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  event.target.textContent = '✓ Copiado';
  setTimeout(()=>event.target.textContent='Copiar texto', 2000);
}

function deleteAd(id) {
  if (!confirm('¿Eliminar este anuncio permanentemente?')) return;
  ads = ads.filter(a=>a.id!==id);
  cajas.forEach(c=>{ c.items = c.items.filter(i=>i.adId!==id); });
  save(); renderAds();
  if (document.getElementById('sec-almacen').style.display === 'block') renderAlmacen();
}

function editAd(id) {
  const ad = ads.find(a=>a.id===id);
  if (!ad) return;
  editingAdId = id;
  currentPhotos = ad.photos ? [...ad.photos] : [];

  document.getElementById('f-title').value = ad.title || '';
  document.getElementById('f-price').value = ad.price || '';
  document.getElementById('f-qty').value = stock.qty;
  document.getElementById('f-soldQty').value = stock.soldQty;

  document.getElementById('f-qty').value = '1';
  document.getElementById('f-soldQty').value = '0';

function populateCajaSelect(selected) {
  document.getElementById('f-caja').innerHTML = '<option value="">— Sin caja —</option>' +
    cajas.map(c=>`<option value="${c.id}" ${c.id===selected?'selected':''}>${c.name}</option>`).join('');
}

function handlePhotos(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const spinner = document.getElementById('loading-spinner');
  spinner.style.display = 'block';
  let processed = 0;

  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
        let width = img.width; let height = img.height;

        if (width > height) {
          if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
        } else {
          if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
        }
        
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        currentPhotos.push(canvas.toDataURL('image/jpeg', 0.6));
        processed++;
        if (processed === files.length) { spinner.style.display = 'none'; renderPhotoPreview(); }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });
}

function renderPhotoPreview() {
  document.getElementById('photoPreviewGrid').innerHTML = currentPhotos.map((p,i)=>`
    <div class="img-preview"><img src="${p}"><button class="del-img" onclick="removePhoto(${i})">✕</button></div>
  `).join('');
}

function removePhoto(i) { currentPhotos.splice(i, 1); renderPhotoPreview(); }

function saveAd() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('El título es obligatorio'); return; }
  
  let qtyInput = parseInt(document.getElementById('f-qty').value);
  let soldQtyInput = parseInt(document.getElementById('f-soldQty').value);
  if(isNaN(qtyInput)) qtyInput = 0;
  if(isNaN(soldQtyInput)) soldQtyInput = 0;
  
  const statusInput = document.getElementById('f-status').value;

  if (statusInput === 'vendido' && qtyInput > 0 && soldQtyInput === 0) {
    soldQtyInput = qtyInput;
    qtyInput = 0;
  }

  const newCajaId = document.getElementById('f-caja').value;
  const adId = editingAdId || Date.now().toString();
  const oldAd = editingAdId ? ads.find(a=>a.id===editingAdId) : null;
  const oldCajaId = oldAd ? oldAd.cajaId : '';

  const ad = {
    id: adId, title,
    price: document.getElementById('f-price').value,
    qty: qtyInput,
    soldQty: soldQtyInput,
    category: document.getElementById('f-cat').value,
    condition: document.getElementById('f-condition').value,
    desc: document.getElementById('f-desc').value,
    status: statusInput,
    cajaId: newCajaId,
    photos: currentPhotos,
    createdAt: oldAd ? oldAd.createdAt : Date.now(),
  };

  if (editingAdId) ads[ads.findIndex(a=>a.id===editingAdId)] = ad;
  else ads.unshift(ad);

  if (oldCajaId && oldCajaId !== newCajaId) {
    const oldCaja = cajas.find(c=>c.id===oldCajaId);
    if (oldCaja) oldCaja.items = oldCaja.items.filter(i=>i.adId!==adId);
  }

  if (newCajaId) {
    const newCaja = cajas.find(c=>c.id===newCajaId);
    if (newCaja) {
      if (!newCaja.items.some(i=>i.adId===adId)) newCaja.items.push({ name: title, adId });
      else newCaja.items.find(i=>i.adId===adId).name = title;
    }
  }

  save(); closeAdForm(); renderAds();
  if (document.getElementById('sec-almacen').style.display === 'block') renderAlmacen();
}

function moveCaja(index, direction) {
  if (direction === -1 && index > 0) {
    const temp = cajas[index];
    cajas[index] = cajas[index - 1];
    cajas[index - 1] = temp;
  } else if (direction === 1 && index < cajas.length - 1) {
    const temp = cajas[index];
    cajas[index] = cajas[index + 1];
    cajas[index + 1] = temp;
  }
  save();
  renderAlmacen();
}

function renderAlmacen() {

  const unassignedAds = ads.filter(a => !a.cajaId);
  document.getElementById('emptyCajas').style.display = (cajas.length === 0 && unassignedAds.length === 0) ? 'block' : 'none';
  
  const sinLugarTotal = unassignedAds.reduce((sum, ad) => sum + ((parseFloat(ad.price) || 0) * getAdStock(ad).qty), 0);

  let html = `
    <div class="caja-card">
      <div class="caja-header" onclick="toggleCaja('sin-lugar')" style="background: #2a2a2a;">

          <span class="caja-icon"><div class="hanko-icon" style="border: 1px dashed rgba(255,255,255,0.4); background: transparent;"><div class="hanko-circle" style="background: var(--gray);"></div></div></span>
          SIN LUGAR <span style="font-family:'Noto Sans JP';font-weight:300;font-size:12px;color:rgba(255,255,255,0.5);">Objetos sueltos</span>
        </div>
        <div class="caja-header-right" style="flex-direction: row; align-items: center; gap: 12px;">
          <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
            <span class="caja-items-count">${unassignedAds.length} obj.</span>
            ${sinLugarTotal > 0 ? `<span class="caja-total">${sinLugarTotal} €</span>` : ''}
          </div>
          <div style="width: 24px;"></div>
        </div>
      </div>
      <div class="caja-body" id="caja-body-sin-lugar">
        ${unassignedAds.length === 0 ? '<div class="caja-item" style="color:var(--gray);font-size:12px;">— no hay objetos sueltos —</div>' :
          unassignedAds.map(ad => `
            <div class="caja-item">
              <div class="caja-item-dot linked" style="background: var(--gray);"></div>
              <div class="caja-item-name">${ad.title || 'Sin título'} ${getAdStock(ad).qty > 1 ? `(x${getAdStock(ad).qty})` : ''}</div>
              <button class="icon-btn" onclick="event.stopPropagation(); editAd('${ad.id}')" title="Editar anuncio" style="font-size:14px;">✎</button>
            </div>
          `).join('')
        }
        <button class="caja-add-btn" onclick="showSection('anuncios'); openAdForm();">+ nuevo anuncio suelto</button>
      </div>
    </div>
  `;

  html += cajas.map((c, boxIndex) => {
    const boxTotal = (c.items||[]).reduce((sum, item) => {
      if(item.adId) { 
        const ad = ads.find(a => a.id === item.adId); 
        if(ad) return sum + ((parseFloat(ad.price) || 0) * getAdStock(ad).qty); 
      }
      return sum;
    }, 0);
    return `
    <div class="caja-card">
      <div class="caja-header" onclick="toggleCaja('${c.id}')">
        <div class="caja-name">
          <span class="caja-icon"><div class="hanko-icon"><div class="hanko-circle"></div></div></span>
          ${c.name} ${c.desc ? `<span style="font-family:'Noto Sans JP';font-weight:300;font-size:12px;color:var(--gray);">${c.desc}</span>` : ''}
        </div>
        <div class="caja-header-right" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
          <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
            <span class="caja-items-count">${(c.items||[]).length} obj.</span>
            ${boxTotal > 0 ? `<span class="caja-total">${boxTotal} €</span>` : ''}
          </div>
          
          <div style="display:flex; gap: 2px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 6px; margin-left: 2px;">
            ${boxIndex > 0 ? `<button class="icon-btn" onclick="event.stopPropagation(); moveCaja(${boxIndex}, -1)" style="color: rgba(255,255,255,0.6); font-size: 10px; padding: 4px;" title="Subir Caja">▲</button>` : `<div style="width:18px"></div>`}
            ${boxIndex < cajas.length - 1 ? `<button class="icon-btn" onclick="event.stopPropagation(); moveCaja(${boxIndex}, 1)" style="color: rgba(255,255,255,0.6); font-size: 10px; padding: 4px;" title="Bajar Caja">▼</button>` : `<div style="width:18px"></div>`}

            return `
            <div class="caja-item">
              <div class="caja-item-dot ${linked?'linked':''}"></div>
              <div class="caja-item-name">${item.name}${qtyStr}</div>

                <button class="icon-btn" onclick="event.stopPropagation(); removeItem('${c.id}',${i})" style="font-size:14px; color:var(--red);" title="Eliminar">✕</button>
              </div>
            </div>
          `}).join('')
        }
        <button class="caja-add-btn" onclick="openItemForm('${c.id}')">+ añadir objeto a la caja</button>
      </div>
    </div>
  `}).join('');

function toggleCaja(id) { document.getElementById('caja-body-'+id).classList.toggle('open'); }

function openCajaForm() {

  document.getElementById('cf-name').value = '';
  document.getElementById('cf-desc').value = '';
  document.getElementById('cajaFormTitle').textContent = '箱 · Nueva Caja';
  document.getElementById('cf-delete-btn').style.display = 'none';
  document.getElementById('cajaFormOverlay').classList.add('open');
}

function editCaja(id) {
  editingCajaId = id; const c = cajas.find(x => x.id === id); if (!c) return;
  document.getElementById('cf-name').value = c.name;
  document.getElementById('cf-desc').value = c.desc || '';
  document.getElementById('cajaFormTitle').textContent = '箱 · Editar Caja';
  document.getElementById('cf-delete-btn').style.display = 'block';
  document.getElementById('cajaFormOverlay').classList.add('open');
}

function closeCajaForm() { document.getElementById('cajaFormOverlay').classList.remove('open'); }

function saveCaja() {
  const name = document.getElementById('cf-name').value.trim();
  if (!name) { alert('Nombre obligatorio'); return; }
  if (editingCajaId) {
    const c = cajas.find(x => x.id === editingCajaId);
    if (c) { c.name = name; c.desc = document.getElementById('cf-desc').value; }
  } else {
    cajas.push({ id: Date.now().toString(), name, desc: document.getElementById('cf-desc').value, items: [] });
  }
  save(); closeCajaForm(); renderAlmacen(); renderAds();
}

function deleteCaja() {
  if (!editingCajaId || !confirm('¿Eliminar esta caja permanentemente? Los objetos que contenga pasarán a estar "SIN LUGAR".')) return;
  const cajaToDelete = cajas.find(c => c.id === editingCajaId);
  
  if (cajaToDelete && cajaToDelete.items) {
    cajaToDelete.items.forEach(item => {
      if (!item.adId) {
        ads.unshift({
          id: Date.now().toString() + Math.random().toString(36).substring(2, 6),
          title: item.name, price: '', qty: 1, soldQty: 0, category: 'Otro', condition: 'Buen estado',
          desc: 'Recuperado de la caja eliminada: ' + cajaToDelete.name,
          status: 'borrador', cajaId: '', photos: [], createdAt: Date.now()
        });
      }
    });
  }
  
  cajas = cajas.filter(c => c.id !== editingCajaId);
  ads.forEach(a => { if (a.cajaId === editingCajaId) a.cajaId = ''; });
  
  save(); closeCajaForm(); renderAlmacen(); renderAds();
}

function closeItemForm() { document.getElementById('itemFormOverlay').classList.remove('open'); }

function saveItem() {
  const name = document.getElementById('if-name').value.trim();
  if (!name) { alert('Nombre obligatorio'); return; }
  const caja = cajas.find(c=>c.id===currentCajaId);
  if (!caja) return;
  const newAdId = document.getElementById('if-ad').value;
  
  if (currentItemIndex !== null) {
    const oldAdId = caja.items[currentItemIndex].adId;
    caja.items[currentItemIndex] = { name, adId: newAdId };
    
    if (oldAdId && oldAdId !== newAdId) {
      const oldAd = ads.find(a=>a.id===oldAdId);
      if (oldAd) oldAd.cajaId = '';
    }
  } else {
    caja.items.push({ name, adId: newAdId });
  }
  
  if (newAdId) { 
    const ad = ads.find(a=>a.id===newAdId); 
    if (ad) ad.cajaId = currentCajaId; 
  }
  
  save(); closeItemForm(); renderAlmacen(); renderAds();
}

function removeItem(cajaId, i) {
  if (!confirm('¿Quitar objeto de la caja?')) return;
  const caja = cajas.find(c=>c.id===cajaId);
  if (!caja) return;
  const item = caja.items[i];
  if (item && item.adId) { const ad = ads.find(a => a.id === item.adId); if (ad) ad.cajaId = ''; }
  caja.items.splice(i, 1);
  save(); renderAlmacen();
}

renderAds();
</script>
